<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>割り勘メモ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #F5F3EE; --white: #fff; --border: #E8E4DC; --border2: #E0D9D0;
    --text: #1a1a1a; --muted: #A89B8A; --muted2: #C4B9AC; --muted3: #AAA;
    --teal: #2BA8A0; --red: #E05C5C; --amber: #D4820A;
    --shadow: 0 1px 4px rgba(0,0,0,0.07); --shadow2: 0 2px 12px rgba(0,0,0,0.09);
  }
  html, body { height: 100%; background: var(--bg); font-family: 'Hiragino Kaku Gothic ProN','BIZ UDPGothic','Noto Sans JP',sans-serif; color: var(--text); }

  /* Header */
  #header { background: var(--white); padding: env(safe-area-inset-top,0) 0 0; border-bottom: 1px solid var(--border); box-shadow: var(--shadow2); position: sticky; top: 0; z-index: 100; }
  #header-inner { padding: 18px 18px 14px; }
  #header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  #header-left { flex: 1; }
  #header-label { font-size: 9px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
  #header-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  #save-status { font-size: 11px; color: transparent; transition: color 0.3s; flex: 1; text-align: center; }
  #save-status.saving { color: var(--amber); }
  #save-status.saved { color: var(--teal); }
  #stats { display: flex; gap: 10px; }
  .stat-card { flex: 1; background: var(--bg); border-radius: 10px; padding: 8px 12px; border: 1px solid var(--border); }
  .stat-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .stat-value { font-size: 17px; font-weight: 800; color: var(--text); }

  /* Hamburger button */
  #menu-btn { background: none; border: none; cursor: pointer; padding: 8px 4px; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  #menu-btn span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }

  /* Drawer */
  #drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; }
  #drawer-overlay.open { display: block; }
  #drawer { position: fixed; top: 0; right: -290px; width: 290px; height: 100%; background: var(--white); z-index: 201; padding-top: env(safe-area-inset-top,0); box-shadow: -4px 0 20px rgba(0,0,0,0.15); transition: right 0.28s cubic-bezier(0.4,0,0.2,1); }
  #drawer.open { right: 0; }
  #drawer-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  #drawer-title { font-size: 16px; font-weight: 800; }
  #drawer-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .drawer-item { display: flex; align-items: center; gap: 14px; padding: 18px 20px; border-bottom: 1px solid #F5F3EE; cursor: pointer; transition: background 0.1s; }
  .drawer-item:active { background: #F5F3EE; }
  .drawer-icon { font-size: 20px; width: 28px; text-align: center; }
  .drawer-item-title { font-size: 14px; font-weight: 700; }
  .drawer-item-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .drawer-item.danger .drawer-item-title { color: var(--red); }

  /* Content */
  #content { padding: 0 16px 100px; max-width: 500px; margin: 0 auto; }
  .section { margin-top: 22px; }
  .section-label { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 9px; font-weight: 700; }

  /* Tags */
  .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
  .member-tag { display: inline-flex; align-items: center; gap: 6px; border-radius: 20px; padding: 6px 12px; font-size: 13px; border: 1.5px solid; }
  .member-dot { width: 7px; height: 7px; border-radius: 50%; }
  .remove-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 15px; line-height: 1; padding: 0 0 0 2px; }

  /* Inputs */
  .input-row { display: flex; gap: 8px; }
  input[type=text], input[type=number] { background: #F9F7F4; border: 1.5px solid var(--border2); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 16px; outline: none; width: 100%; font-family: inherit; -webkit-appearance: none; }
  input::placeholder { color: var(--muted2); }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Buttons */
  .btn { padding: 12px 16px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; border: 1.5px solid; white-space: nowrap; font-family: inherit; transition: opacity 0.15s, transform 0.1s; -webkit-appearance: none; }
  .btn:active { opacity: 0.75; transform: scale(0.97); }
  .btn-teal { background: #2BA8A018; border-color: #2BA8A066; color: var(--teal); }
  .btn-amber { background: #D4820A18; border-color: #D4820A66; color: var(--amber); }
  .btn-gray { background: #F5F3EE; border-color: #E0D9D0; color: var(--muted3); }
  .btn-row { display: flex; gap: 8px; }
  .tag-btn { padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; border: 1.5px solid #E0D9D0; background: #F9F7F4; color: #888; font-weight: 400; transition: all 0.15s; font-family: inherit; -webkit-appearance: none; }
  .tag-btn:active { transform: scale(0.95); }
  .add-dashed { width: 100%; padding: 14px; background: var(--white); border: 1.5px dashed #D4CDC4; border-radius: 12px; color: var(--muted3); cursor: pointer; font-size: 14px; font-family: inherit; }
  .add-dashed:active { background: #f0ede8; }

  /* Cards */
  .card { background: var(--white); border-radius: 12px; padding: 13px 14px; margin-bottom: 8px; box-shadow: var(--shadow); border: 1px solid #EDE9E2; }
  .expense-card { display: flex; align-items: flex-start; gap: 8px; border-left: 3px solid; }
  .expense-card-body { flex: 1; min-width: 0; }
  .expense-title { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .expense-amount { font-size: 15px; font-weight: 800; }
  .expense-desc { font-size: 13px; color: #888; }
  .expense-meta { font-size: 11px; color: var(--muted3); margin-top: 3px; }
  .expense-per { color: var(--muted2); }
  .icon-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0; flex-shrink: 0; line-height: 1; }
  .form-card { background: var(--white); border-radius: 14px; padding: 16px; margin-top: 6px; border: 1px solid var(--border); box-shadow: var(--shadow2); }
  .form-title { font-size: 11px; color: var(--muted); margin-bottom: 12px; font-weight: 700; letter-spacing: 1px; }
  .form-field { margin-bottom: 12px; }
  .preview-box { background: var(--bg); border-radius: 8px; padding: 9px 13px; font-size: 12px; color: var(--muted); margin-bottom: 12px; border: 1px solid var(--border); }
  .group-card { display: flex; align-items: center; gap: 8px; }
  .group-body { flex: 1; min-width: 0; }
  .group-name { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
  .group-members-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
  .mini-tag { display: inline-flex; align-items: center; gap: 3px; border-radius: 12px; padding: 3px 9px; border: 1px solid; }
  .mini-dot { width: 5px; height: 5px; border-radius: 50%; }
  .group-balance { font-size: 12px; color: var(--muted3); }

  /* Settlement */
  .balance-list { background: var(--white); border-radius: 12px; padding: 4px 14px; box-shadow: var(--shadow); border: 1px solid #EDE9E2; margin-bottom: 14px; }
  .balance-row { display: flex; align-items: center; gap: 9px; padding: 11px 0; border-bottom: 1px solid var(--bg); }
  .balance-row:last-child { border-bottom: none; }
  .balance-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .balance-name { flex: 1; font-size: 13px; }
  .balance-amount { font-size: 13px; font-weight: 800; }
  .balance-label { font-size: 11px; color: var(--muted2); min-width: 44px; text-align: right; }
  .txn-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
  .txn-card { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .txn-from, .txn-to { font-size: 13px; font-weight: 800; }
  .txn-arrow { color: var(--muted2); }
  .txn-group { font-size: 11px; color: var(--amber); margin-left: 2px; }
  .txn-amount { margin-left: auto; font-weight: 800; font-size: 15px; }
  .all-settled { text-align: center; color: var(--teal); font-size: 14px; font-weight: 700; padding: 12px 0; }
  .in-group { opacity: 0.4; }
  .group-tag { font-size: 10px; color: var(--muted2); margin-left: 4px; }

  /* Image Modal */
  #img-modal { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.8); flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; }
  #img-modal.open { display: flex; }
  #img-preview { max-width: 100%; max-height: 65vh; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); display: block; }
  #img-hint { color: #fff; font-size: 14px; margin-top: 18px; text-align: center; line-height: 1.8; opacity: 0.9; }
  #img-hint strong { display: block; font-size: 16px; margin-bottom: 4px; }
  #img-close { margin-top: 18px; padding: 12px 36px; background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.35); border-radius: 24px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* Reset Confirm */
  #confirm-modal { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.45); align-items: flex-end; justify-content: center; }
  #confirm-modal.open { display: flex; }
  #confirm-sheet { background: var(--white); border-radius: 20px 20px 0 0; padding: 28px 20px calc(32px + env(safe-area-inset-bottom,0)); width: 100%; max-width: 500px; }
  #confirm-sheet h3 { font-size: 17px; font-weight: 800; margin-bottom: 8px; }
  #confirm-sheet p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 22px; }
  .confirm-red { width: 100%; padding: 15px; background: var(--red); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; margin-bottom: 10px; }
  .confirm-cancel { width: 100%; padding: 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<!-- Drawer Overlay -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div id="drawer-header">
    <div id="drawer-title">メニュー</div>
    <div id="drawer-sub">割り勘メモ</div>
  </div>
  <div class="drawer-item" onclick="closeDrawer(); exportImage();">
    <div class="drawer-icon">📷</div>
    <div>
      <div class="drawer-item-title">精算結果を画像保存</div>
      <div class="drawer-item-desc">長押しでアルバムに保存できます</div>
    </div>
  </div>
  <div class="drawer-item danger" onclick="closeDrawer(); showReset();">
    <div class="drawer-icon">🗑️</div>
    <div>
      <div class="drawer-item-title">リセット（新規割り勘）</div>
      <div class="drawer-item-desc">支出・グループをすべてクリア</div>
    </div>
  </div>
</div>

<!-- Header -->
<div id="header">
  <div id="header-inner">
    <div id="header-top">
      <div id="header-left">
        <div id="header-label">Split</div>
        <div id="header-title">割り勘メモ</div>
      </div>
      <div id="save-status">✓ 保存済み</div>
      <button id="menu-btn" onclick="openDrawer()" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div id="stats">
      <div class="stat-card"><div class="stat-label">合計支出</div><div class="stat-value" id="stat-total">¥0</div></div>
      <div class="stat-card"><div class="stat-label">メンバー</div><div class="stat-value" id="stat-members">0人</div></div>
    </div>
  </div>
</div>

<!-- Content -->
<div id="content">
  <!-- Members -->
  <div class="section">
    <div class="section-label">メンバー</div>
    <div class="tags" id="member-tags"></div>
    <div class="input-row">
      <input type="text" id="new-member" placeholder="名前を入力..." maxlength="20">
      <button class="btn btn-teal" onclick="addMember()">追加</button>
    </div>
  </div>

  <!-- Expenses -->
  <div class="section">
    <div class="section-label" id="expenses-label">支出一覧 (0件)</div>
    <div id="expense-list"></div>
    <div id="expense-add-area">
      <button class="add-dashed" onclick="openExpenseForm()">＋ 支出を追加</button>
    </div>
  </div>

  <!-- Groups -->
  <div class="section">
    <div class="section-label">グループ精算 <span style="font-size:9px;color:#C4B9AC;">（夫婦・カップルなど）</span></div>
    <div id="group-list"></div>
    <div id="group-add-area">
      <button class="add-dashed" onclick="openGroupForm()">＋ グループを追加</button>
    </div>
  </div>

  <!-- Settlement -->
  <div class="section" id="settlement-section" style="display:none;">
    <div class="section-label">精算結果</div>
    <div id="export-card" style="background:#fff;border-radius:14px;padding:18px 16px;border:1px solid #EDE9E2;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-size:9px;letter-spacing:3px;color:#A89B8A;text-transform:uppercase;font-weight:700;">Split</div>
          <div style="font-size:18px;font-weight:800;">割り勘メモ</div>
        </div>
        <div id="export-date" style="font-size:11px;color:#C4B9AC;"></div>
      </div>
      <div class="balance-list" id="balance-list" style="margin-bottom:12px;"></div>
      <div id="txn-section"></div>
      <div id="export-total" style="margin-top:12px;padding-top:10px;border-top:1px solid #F5F3EE;font-size:11px;color:#A89B8A;text-align:right;"></div>
    </div>
    <button onclick="exportImage()" style="width:100%;margin-top:12px;padding:14px;background:var(--teal);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;">
      📷 画像として保存
    </button>
  </div>
</div>

<!-- Image Modal -->
<div id="img-modal">
  <img id="img-preview" src="" alt="精算結果">
  <div id="img-hint">
    <strong>📥 画像を長押し</strong>
    「写真に追加」でカメラロールに保存できます
  </div>
  <button id="img-close" onclick="closeImgModal()">閉じる</button>
</div>

<!-- Reset Confirm -->
<div id="confirm-modal">
  <div id="confirm-sheet">
    <h3>🗑️ リセットしますか？</h3>
    <p>支出とグループをすべて削除します。<br>メンバーはそのまま残ります。<br>この操作は元に戻せません。</p>
    <button class="confirm-red" onclick="doReset()">リセットする</button>
    <button class="confirm-cancel" onclick="closeReset()">キャンセル</button>
  </div>
</div>

<script>
const COLORS = ["#E05C5C","#2BA8A0","#3A8CC4","#4A9E6E","#D4820A","#8B5CF6","#0891B2","#B45309"];
const STORE_KEY = "warikan-data-v2";
let state = { members: [], expenses: [], groups: [] };

// Storage
function loadData() {
  try { const d = JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); if(d.members)state.members=d.members; if(d.expenses)state.expenses=d.expenses; if(d.groups)state.groups=d.groups; } catch(e) {}
}
let saveTimer = null;
function saveData() {
  const el = document.getElementById('save-status');
  el.textContent='保存中…'; el.className='saving';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
    el.textContent='✓ 保存済み'; el.className='saved';
    setTimeout(()=>{ el.className=''; }, 2000);
  }, 500);
}

function col(name) { return COLORS[state.members.indexOf(name) % COLORS.length]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Drawer
function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }

// Reset
function showReset() { document.getElementById('confirm-modal').classList.add('open'); }
function closeReset() { document.getElementById('confirm-modal').classList.remove('open'); }
function doReset() {
  state.expenses = []; state.groups = [];
  closeReset(); saveData(); render();
}

// Compute
function compute() {
  const bal = {}; state.members.forEach(m=>bal[m]=0);
  state.expenses.forEach(e => {
    const sh = e.amount/e.targets.length;
    e.targets.forEach(t=>{ bal[t]=(bal[t]||0)-sh; });
    bal[e.payer]=(bal[e.payer]||0)+e.amount;
  });
  const merged = {...bal};
  state.groups.forEach(g => {
    const tot = g.members.reduce((s,m)=>s+(merged[m]||0),0);
    g.members.forEach(m=>{ merged[m]=0; });
    merged[g.members[0]]=tot;
  });
  const neg=Object.entries(merged).filter(([,v])=>v<-0.5).map(([k,v])=>({n:k,v})).sort((a,b)=>a.v-b.v);
  const pos=Object.entries(merged).filter(([,v])=>v>0.5).map(([k,v])=>({n:k,v})).sort((a,b)=>b.v-a.v);
  const txns=[]; let i=0,j=0;
  while(i<neg.length&&j<pos.length){
    const p=Math.min(-neg[i].v,pos[j].v);
    if(p>0.5)txns.push({from:neg[i].n,to:pos[j].n,amt:Math.round(p)});
    neg[i].v+=p; pos[j].v-=p;
    if(Math.abs(neg[i].v)<0.5)i++; if(Math.abs(pos[j].v)<0.5)j++;
  }
  return { balance:bal, txns };
}

// Render
function render() {
  const { balance, txns } = compute();
  const total = state.expenses.reduce((s,e)=>s+e.amount,0);
  const grouped = new Set(state.groups.flatMap(g=>g.members));

  document.getElementById('stat-total').textContent = '¥'+total.toLocaleString();
  document.getElementById('stat-members').textContent = state.members.length+'人';
  document.getElementById('expenses-label').textContent = `支出一覧 (${state.expenses.length}件)`;

  document.getElementById('member-tags').innerHTML = state.members.length === 0
    ? `<div style="color:#C4B9AC;font-size:13px;padding:4px 0 6px;">まずメンバーを追加してください</div>`
    : state.members.map((m,i)=>{
    const c=col(m);
    return `<div class="member-tag" style="background:${c}14;border-color:${c}55;">
      <div class="member-dot" style="background:${c}"></div><span>${esc(m)}</span>
      <button class="remove-btn" onclick="removeMember(${i})">×</button>
    </div>`;
  }).join('');

  document.getElementById('expense-list').innerHTML = !state.expenses.length
    ? `<div style="text-align:center;color:#C4B9AC;padding:18px 0;font-size:13px;">まだ支出がありません</div>`
    : state.expenses.map(e=>{
      const c=col(e.payer);
      return `<div class="card expense-card" style="border-left-color:${c}">
        <div class="expense-card-body">
          <div class="expense-title"><span class="expense-amount">¥${e.amount.toLocaleString()}</span><span class="expense-desc">${esc(e.desc)}</span></div>
          <div class="expense-meta"><span style="color:${c};font-weight:700;">${esc(e.payer)}</span>が支払い ／ ${e.split==='all'?'全員':e.targets.map(esc).join('・')}で割り勘<span class="expense-per">（1人¥${Math.round(e.amount/e.targets.length).toLocaleString()}）</span></div>
        </div>
        <button class="icon-btn" onclick="removeExpense('${e.id}')">×</button>
      </div>`;
    }).join('');

  document.getElementById('group-list').innerHTML = state.groups.map(g=>{
    const gb=g.members.reduce((s,m)=>s+(balance[m]||0),0);
    const gbC=gb>=0?'#2BA8A0':'#E05C5C';
    return `<div class="card group-card">
      <div class="group-body">
        <div class="group-name">${esc(g.name)}</div>
        <div class="group-members-row">${g.members.map(m=>{const c=col(m);return `<div class="mini-tag" style="background:${c}14;border-color:${c}44;"><div class="mini-dot" style="background:${c}"></div><span style="font-size:11px;color:${c};">${esc(m)}</span></div>`;}).join('')}</div>
        <div class="group-balance">合計：<span style="font-weight:700;color:${gbC};">${gb>=0?'+':'-'}¥${Math.round(Math.abs(gb)).toLocaleString()}</span><span style="font-size:11px;color:#C4B9AC;margin-left:6px;">(${g.members.map(m=>{const b=balance[m]||0;return `${esc(m)}: ${b>=0?'+':'-'}¥${Math.round(Math.abs(b)).toLocaleString()}`;}).join(' / ')})</span></div>
      </div>
      <button class="icon-btn" onclick="removeGroup('${g.id}')">×</button>
    </div>`;
  }).join('');

  const ss=document.getElementById('settlement-section');
  if(!state.expenses.length){ ss.style.display='none'; return; }
  ss.style.display='block';

  const now=new Date();
  document.getElementById('export-date').textContent=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  document.getElementById('export-total').textContent=`合計支出 ¥${total.toLocaleString()} ／ ${state.members.length}人`;

  let balHtml = state.members.map(m=>{
    const b=balance[m]||0; const inG=grouped.has(m);
    const bC=b>=0?'#2BA8A0':'#E05C5C';
    const bL=b>0.5?'受取':b<-0.5?'支払い':'±0';
    return `<div class="balance-row${inG?' in-group':''}">
      <div class="balance-dot" style="background:${col(m)}"></div>
      <div class="balance-name">${esc(m)}${inG?'<span class="group-tag">（グループ）</span>':''}</div>
      <div class="balance-amount" style="color:${bC};">${b>=0?'+':'-'}¥${Math.round(Math.abs(b)).toLocaleString()}</div>
      <div class="balance-label">${bL}</div>
    </div>`;
  }).join('');
  balHtml += state.groups.map(g=>{
    const b=g.members.reduce((s,m)=>s+(balance[m]||0),0);
    const bC=b>=0?'#2BA8A0':'#E05C5C'; const bL=b>0.5?'受取':b<-0.5?'支払い':'±0';
    return `<div class="balance-row">
      <div style="font-size:13px;">👫</div>
      <div class="balance-name" style="font-weight:700;color:#D4820A;">${esc(g.name)} <span style="font-size:11px;font-weight:400;color:#C4B9AC;">(${g.members.map(esc).join('・')})</span></div>
      <div class="balance-amount" style="color:${bC};">${b>=0?'+':'-'}¥${Math.round(Math.abs(b)).toLocaleString()}</div>
      <div class="balance-label">${bL}</div>
    </div>`;
  }).join('');
  document.getElementById('balance-list').innerHTML = balHtml;

  document.getElementById('txn-section').innerHTML = !txns.length
    ? `<div class="all-settled">✓ 精算不要です</div>`
    : `<div class="txn-label">送金リスト</div>` + txns.map(t=>{
      const fg=state.groups.find(g=>g.members.includes(t.from));
      const tg=state.groups.find(g=>g.members.includes(t.to));
      return `<div class="card txn-card">
        <div><span class="txn-from" style="color:${col(t.from)};">${esc(t.from)}</span>${fg?`<span class="txn-group">(${esc(fg.name)})</span>`:''}</div>
        <span class="txn-arrow">→</span>
        <div><span class="txn-to" style="color:${col(t.to)};">${esc(t.to)}</span>${tg?`<span class="txn-group">(${esc(tg.name)})</span>`:''}</div>
        <span class="txn-amount">¥${t.amt.toLocaleString()}</span>
      </div>`;
    }).join('');
}

// Actions
function addMember() {
  const inp=document.getElementById('new-member'); const n=inp.value.trim();
  if(n&&!state.members.includes(n)){ state.members.push(n); inp.value=''; saveData(); render(); }
  inp.focus();
}
function removeMember(i) {
  const r=state.members[i]; state.members.splice(i,1);
  state.expenses=state.expenses.filter(e=>e.payer!==r);
  state.groups=state.groups.map(g=>({...g,members:g.members.filter(m=>m!==r)})).filter(g=>g.members.length>0);
  saveData(); render();
}
function removeExpense(id){ state.expenses=state.expenses.filter(e=>e.id!==id); saveData(); render(); }
function removeGroup(id){ state.groups=state.groups.filter(g=>g.id!==id); saveData(); render(); }

// Export Image — 明細＋精算結果を1枚に合成して長押しでアルバム保存
async function exportImage() {
  if(!state.expenses.length){ alert('支出を追加してから保存してください'); return; }

  // 画像用の隠しカードを一時生成
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:360px;background:#F5F3EE;padding:20px;font-family:Hiragino Kaku Gothic ProN,BIZ UDPGothic,sans-serif;';

  const { balance, txns } = compute();
  const total = state.expenses.reduce((s,e)=>s+e.amount,0);
  const grouped = new Set(state.groups.flatMap(g=>g.members));
  const now = new Date();
  const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;

  // ヘッダー
  wrap.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:16px 16px 4px;margin-bottom:12px;border:1px solid #EDE9E2;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-size:8px;letter-spacing:3px;color:#A89B8A;text-transform:uppercase;font-weight:700;">Split</div>
          <div style="font-size:18px;font-weight:800;color:#1a1a1a;">割り勘メモ</div>
        </div>
        <div style="font-size:11px;color:#C4B9AC;">${dateStr}</div>
      </div>

      <!-- 明細 -->
      <div style="font-size:8px;letter-spacing:3px;color:#A89B8A;text-transform:uppercase;font-weight:700;margin-bottom:8px;">支出明細 (${state.expenses.length}件)</div>
      ${state.expenses.map(e=>{
        const c = COLORS[state.members.indexOf(e.payer) % COLORS.length] || '#888';
        return `<div style="display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid #F5F3EE;">
          <div style="width:3px;align-self:stretch;background:${c};border-radius:2px;flex-shrink:0;"></div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;">
              <span style="font-size:14px;font-weight:800;">¥${e.amount.toLocaleString()}</span>
              <span style="font-size:12px;color:#888;">${esc(e.desc)}</span>
            </div>
            <div style="font-size:10px;color:#AAA;margin-top:2px;">
              <span style="color:${c};font-weight:700;">${esc(e.payer)}</span>が支払い ／ ${e.split==='all'?'全員':e.targets.map(esc).join('・')}で割り勘
              <span style="color:#C4B9AC;">（1人¥${Math.round(e.amount/e.targets.length).toLocaleString()}）</span>
            </div>
          </div>
        </div>`;
      }).join('')}
      <div style="text-align:right;font-size:11px;color:#A89B8A;padding:10px 0 6px;">合計支出 ¥${total.toLocaleString()} ／ ${state.members.length}人</div>
    </div>

    <!-- 精算結果 -->
    <div style="background:#fff;border-radius:14px;padding:16px;border:1px solid #EDE9E2;">
      <div style="font-size:8px;letter-spacing:3px;color:#A89B8A;text-transform:uppercase;font-weight:700;margin-bottom:10px;">精算結果</div>
      ${state.members.map(m=>{
        const b=balance[m]||0; const inG=grouped.has(m);
        const bC=b>=0?'#2BA8A0':'#E05C5C';
        const bL=b>0.5?'受取':b<-0.5?'支払い':'±0';
        const mc=COLORS[state.members.indexOf(m)%COLORS.length];
        return `<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #F5F3EE;opacity:${inG?0.4:1};">
          <div style="width:8px;height:8px;border-radius:50%;background:${mc};flex-shrink:0;"></div>
          <div style="flex:1;font-size:13px;">${esc(m)}${inG?'<span style="font-size:10px;color:#C4B9AC;margin-left:4px;">（グループ）</span>':''}</div>
          <div style="font-size:13px;font-weight:800;color:${bC};">${b>=0?'+':'-'}¥${Math.round(Math.abs(b)).toLocaleString()}</div>
          <div style="font-size:11px;color:#C4B9AC;min-width:40px;text-align:right;">${bL}</div>
        </div>`;
      }).join('')}
      ${state.groups.map(g=>{
        const b=g.members.reduce((s,m)=>s+(balance[m]||0),0);
        const bC=b>=0?'#2BA8A0':'#E05C5C'; const bL=b>0.5?'受取':b<-0.5?'支払い':'±0';
        return `<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #F5F3EE;">
          <div style="font-size:13px;">👫</div>
          <div style="flex:1;font-size:13px;font-weight:700;color:#D4820A;">${esc(g.name)} <span style="font-size:11px;font-weight:400;color:#C4B9AC;">(${g.members.map(esc).join('・')})</span></div>
          <div style="font-size:13px;font-weight:800;color:${bC};">${b>=0?'+':'-'}¥${Math.round(Math.abs(b)).toLocaleString()}</div>
          <div style="font-size:11px;color:#C4B9AC;min-width:40px;text-align:right;">${bL}</div>
        </div>`;
      }).join('')}
      ${!txns.length
        ? `<div style="text-align:center;color:#2BA8A0;font-size:13px;font-weight:700;padding:12px 0;">✓ 精算不要です</div>`
        : `<div style="font-size:8px;color:#A89B8A;letter-spacing:2px;text-transform:uppercase;margin:12px 0 8px;font-weight:700;">送金リスト</div>
          ${txns.map(t=>{
            const fc=COLORS[state.members.indexOf(t.from)%COLORS.length];
            const tc=COLORS[state.members.indexOf(t.to)%COLORS.length];
            const fg=state.groups.find(g=>g.members.includes(t.from));
            const tg=state.groups.find(g=>g.members.includes(t.to));
            return `<div style="display:flex;align-items:center;gap:6px;padding:9px 12px;background:#F5F3EE;border-radius:9px;margin-bottom:5px;">
              <span style="color:${fc};font-size:13px;font-weight:800;">${esc(t.from)}</span>${fg?`<span style="font-size:10px;color:#D4820A;">(${esc(fg.name)})</span>`:''}
              <span style="color:#C4B9AC;">→</span>
              <span style="color:${tc};font-size:13px;font-weight:800;">${esc(t.to)}</span>${tg?`<span style="font-size:10px;color:#D4820A;">(${esc(tg.name)})</span>`:''}
              <span style="margin-left:auto;font-weight:800;font-size:14px;">¥${t.amt.toLocaleString()}</span>
            </div>`;
          }).join('')}`
      }
    </div>`;

  document.body.appendChild(wrap);
  try {
    const canvas = await html2canvas(wrap, { scale:3, backgroundColor:'#F5F3EE', useCORS:true, logging:false });
    document.getElementById('img-preview').src = canvas.toDataURL('image/png');
    document.getElementById('img-modal').classList.add('open');
  } catch(e) { alert('画像の生成に失敗しました'); }
  document.body.removeChild(wrap);
}
function closeImgModal(){
  document.getElementById('img-modal').classList.remove('open');
  document.getElementById('img-preview').src='';
}

// Expense Form
let expForm={desc:'',amount:'',payer:0,split:'all',targets:[]};
function updateExpPreview(){
  expForm.amount=document.getElementById('exp-amount')?.value||'';
  const ph=expForm.split==='all'?state.members.length:expForm.targets.length;
  const box=document.getElementById('exp-preview'); if(!box)return;
  const a=parseFloat(expForm.amount);
  box.textContent=(a>0&&ph>0)?`1人あたり ¥${Math.round(a/ph).toLocaleString()}`:'';
  box.style.display=(a>0&&ph>0)?'block':'none';
}
function openExpenseForm(){ expForm={desc:'',amount:'',payer:0,split:'all',targets:[]}; renderExpenseForm(); }
function renderExpenseForm(){
  const payerTags=state.members.map((m,i)=>{ const c=col(m); const on=expForm.payer===i;
    return `<button class="tag-btn" onclick="setExpPayer(${i})" style="${on?`border-color:${c};background:${c}14;color:${c};font-weight:700;`:''}">${esc(m)}</button>`;
  }).join('');
  const splitTags=['all','custom'].map(s=>{ const on=expForm.split===s;
    return `<button class="tag-btn" onclick="setExpSplit('${s}')" style="${on?`border-color:#2BA8A0;background:#2BA8A014;color:#2BA8A0;font-weight:700;`:''}">${s==='all'?'全員で割り勘':'人を選ぶ'}</button>`;
  }).join('');
  const customTargets=expForm.split==='custom'?`<div class="tags" style="margin-top:8px;">${state.members.map(m=>{const c=col(m);const on=expForm.targets.includes(m);
    return `<button class="tag-btn" onclick="toggleExpTarget('${esc(m)}')" style="${on?`border-color:${c};background:${c}14;color:${c};font-weight:700;`:''}">${on?'✓ ':''}${esc(m)}</button>`;
  }).join('')}</div>`:'';
  const a=parseFloat(expForm.amount); const ph=expForm.split==='all'?state.members.length:expForm.targets.length;
  const pText=(a>0&&ph>0)?`1人あたり ¥${Math.round(a/ph).toLocaleString()}`:'';
  document.getElementById('expense-add-area').innerHTML=`
    <div class="form-card">
      <div class="form-title">新しい支出</div>
      <div class="form-field"><div class="section-label">内容</div>
        <input type="text" id="exp-desc" value="${esc(expForm.desc)}" placeholder="例：ランチ、タクシー…" oninput="expForm.desc=this.value" maxlength="40">
      </div>
      <div class="form-field"><div class="section-label">金額 (¥)</div>
        <input type="number" id="exp-amount" value="${expForm.amount}" placeholder="0" oninput="updateExpPreview()" inputmode="numeric">
      </div>
      <div class="form-field"><div class="section-label">支払った人</div><div class="tags">${payerTags}</div></div>
      <div class="form-field"><div class="section-label">割り勘の対象</div><div class="tags">${splitTags}</div>${customTargets}</div>
      <div class="preview-box" id="exp-preview" style="${pText?'':'display:none;'}">${pText}</div>
      <div class="btn-row">
        <button class="btn btn-teal" style="flex:1;" onclick="addExpense()">追加する</button>
        <button class="btn btn-gray" style="flex:1;" onclick="closeExpenseForm()">キャンセル</button>
      </div>
    </div>`;
}
function setExpPayer(i){ expForm.payer=i; renderExpenseForm(); }
function setExpSplit(s){ expForm.split=s; expForm.targets=[]; renderExpenseForm(); }
function toggleExpTarget(m){ const idx=expForm.targets.indexOf(m); if(idx>=0)expForm.targets.splice(idx,1); else expForm.targets.push(m); renderExpenseForm(); }
function addExpense(){
  const desc=document.getElementById('exp-desc')?.value.trim()||expForm.desc.trim();
  const amount=parseFloat(document.getElementById('exp-amount')?.value||expForm.amount);
  if(!desc||isNaN(amount)||amount<=0){ alert('内容と金額を入力してください'); return; }
  const targets=expForm.split==='all'?[...state.members]:expForm.targets;
  if(!targets.length){ alert('割り勘の対象を選んでください'); return; }
  state.expenses.push({id:Date.now().toString(),desc,amount,payer:state.members[expForm.payer],split:expForm.split,targets});
  closeExpenseForm(); saveData(); render();
}
function closeExpenseForm(){ document.getElementById('expense-add-area').innerHTML=`<button class="add-dashed" onclick="openExpenseForm()">＋ 支出を追加</button>`; }

// Group Form
let grpForm={name:'',members:[]};
function openGroupForm(){ grpForm={name:'',members:[]}; renderGroupForm(); }
function renderGroupForm(){
  const memberTags=state.members.map(m=>{ const c=col(m); const on=grpForm.members.includes(m);
    return `<button class="tag-btn" onclick="toggleGrpMember('${esc(m)}')" style="${on?`border-color:${c};background:${c}14;color:${c};font-weight:700;`:''}">${on?'✓ ':''}${esc(m)}</button>`;
  }).join('');
  const {balance}=compute();
  const preview=grpForm.members.length>=2?`<div class="preview-box" style="margin-top:8px;">合計: <strong>¥${Math.round(Math.abs(grpForm.members.reduce((s,m)=>s+(balance[m]||0),0))).toLocaleString()}</strong></div>`:'';
  document.getElementById('group-add-area').innerHTML=`
    <div class="form-card">
      <div class="form-title">新しいグループ</div>
      <div class="form-field"><div class="section-label">グループ名</div>
        <input type="text" id="grp-name" value="${esc(grpForm.name)}" placeholder="例：夫婦、カップル…" oninput="grpForm.name=this.value" maxlength="20">
      </div>
      <div class="form-field"><div class="section-label">まとめるメンバー（2人以上）</div>
        <div class="tags">${memberTags}</div>${preview}
      </div>
      <div class="btn-row">
        <button class="btn btn-amber" style="flex:1;" onclick="addGroup()">グループを作成</button>
        <button class="btn btn-gray" style="flex:1;" onclick="closeGroupForm()">キャンセル</button>
      </div>
    </div>`;
}
function toggleGrpMember(m){ const idx=grpForm.members.indexOf(m); if(idx>=0)grpForm.members.splice(idx,1); else grpForm.members.push(m); renderGroupForm(); }
function addGroup(){
  const name=document.getElementById('grp-name')?.value.trim()||grpForm.name.trim();
  if(!name){alert('グループ名を入力してください');return;}
  if(grpForm.members.length<2){alert('2人以上を選んでください');return;}
  state.groups.push({id:Date.now().toString(),name,members:[...grpForm.members]});
  closeGroupForm(); saveData(); render();
}
function closeGroupForm(){ document.getElementById('group-add-area').innerHTML=`<button class="add-dashed" onclick="openGroupForm()">＋ グループを追加</button>`; }

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('new-member').addEventListener('keydown',e=>{ if(e.key==='Enter')addMember(); });
  loadData(); render();
});
</script>
</body>
</html>
